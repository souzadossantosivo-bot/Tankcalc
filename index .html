<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberTank - Calculadora de Volume & Cronômetro</title>
    <!-- Tailwind CSS para estilização moderna -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4">
    </script>
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

        body {
            font-family: 'Rajdhani', sans-serif;
            background: radial-gradient(circle at center, #1a0b2e 0%, #05010d 100%);
        }
        .digital-font {
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.7);
        }
        .neon-border {
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
            border: 1px solid rgba(168, 85, 247, 0.6);
        }
        .neon-text-pink {
            text-shadow: 0 0 8px rgba(236, 72, 153, 0.6);
        }

        /* Estilo para os botões da calculadora auxiliar */
        .calc-btn {
            transition: all 0.15s ease;
        }
        .calc-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.3);
        }
        .calc-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen p-4 md:p-8 flex flex-col items-center justify-center">

    <div class="w-full max-w-4xl bg-black/60 backdrop-blur-md rounded-2xl p-6 neon-border">

        <!-- CABEÇALHO COM RELÓGIO E CRONÔMETRO -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 border-b border-purple-500/30 pb-6">
            <!-- Relógio Digital -->
            <div class="flex flex-col items-center justify-center p-4 bg-purple-950/30 rounded-xl border border-cyan-500/30">
                <span class="text-xs tracking-widest text-cyan-400 uppercase font-bold mb-1"><i class="fa-regular fa-clock mr-1"></i> Relógio Digital</span>
                <div id="clock" class="text-3xl md:text-4xl font-bold text-cyan-400 digital-font">00:00:00</div>
            </div>

            <!-- Cronômetro Digital -->
            <div class="flex flex-col items-center justify-center p-4 bg-purple-950/30 rounded-xl border border-pink-500/30">
                <span class="text-xs tracking-widest text-pink-400 uppercase font-bold mb-1"><i class="fa-solid fa-stopwatch mr-1"></i> Cronômetro</span>
                <div id="stopwatch" class="text-3xl md:text-4xl font-bold text-pink-500 digital-font mb-2">00:00:00.<span class="text-xl">00</span></div>
                <div class="flex gap-2">
                    <button onclick="startStopwatch()" class="px-3 py-1 bg-emerald-600 hover:bg-emerald-500 rounded text-xs font-bold uppercase transition cursor-pointer"><i class="fa-solid fa-play"></i></button>
                    <button onclick="pauseStopwatch()" class="px-3 py-1 bg-amber-600 hover:bg-amber-500 rounded text-xs font-bold uppercase transition cursor-pointer"><i class="fa-solid fa-pause"></i></button>
                    <button onclick="resetStopwatch()" class="px-3 py-1 bg-rose-600 hover:bg-rose-500 rounded text-xs font-bold uppercase transition cursor-pointer"><i class="fa-solid fa-rotate-left"></i></button>
                </div>
            </div>
        </div>

        <!-- CORPO PRINCIPAL -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

            <!-- ENTRADA DE DADOS & CALCULADORA AUXILIAR -->
            <div class="flex flex-col justify-between space-y-6">
                <div>
                    <h2 class="text-2xl font-bold text-purple-400 mb-4 uppercase tracking-wide neon-text-pink"><i class="fa-solid fa-layer-group mr-2"></i>Dimensões do Tanque</h2>

                    <div class="mb-4">
                        <label class="block text-sm font-bold text-gray-400 uppercase mb-2">Modelo do Tanque</label>
                        <select id="tankType" onchange="toggleInputs()" class="w-full bg-gray-900 border border-purple-500/50 rounded-lg p-3 text-gray-200 focus:outline-none focus:border-cyan-400 font-bold cursor-pointer">
                            <option value="cylinder">Cilindro Vertical convencional</option>
                            <option value="square">Retangular / Quadrado</option>
                            <option value="cone">Cilindro com Fundo Cônico</option>
                        </select>
                    </div>

                    <!-- Inputs dinâmicos -->
                    <div id="inputsContainer" class="space-y-4">
                        <!-- Gerado via JavaScript -->
                    </div>
                </div>

                <!-- CALCULADORA AUXILIAR MATEMÁTICA -->
                <div class="p-4 bg-black/40 border border-purple-500/30 rounded-xl">
                    <span class="text-xs font-bold uppercase text-purple-400 tracking-wider block mb-2"><i class="fa-solid fa-calculator mr-1"></i> Calculadora Auxiliar</span>
                    <input type="text" id="calcDisplay" readonly class="w-full bg-gray-950 border border-gray-800 rounded p-2 text-right text-xl font-bold text-cyan-400 mb-2 digital-font focus:outline-none">
                    <div class="grid grid-cols-4 gap-1 text-sm font-bold">
                        <button onclick="clearCalc()" class="calc-btn p-2 bg-gray-800 hover:bg-gray-700 rounded transition cursor-pointer text-rose-400">C</button>
                        <button onclick="pressCalc('/')" class="calc-btn p-2 bg-purple-900/40 hover:bg-purple-900 rounded transition cursor-pointer">/</button>
                        <button onclick="pressCalc('*')" class="calc-btn p-2 bg-purple-900/40 hover:bg-purple-900 rounded transition cursor-pointer">*</button>
                        <button onclick="pressCalc('-')" class="calc-btn p-2 bg-purple-900/40 hover:bg-purple-900 rounded transition cursor-pointer">-</button>

                        <button onclick="pressCalc('7')" class="calc-btn p-2 bg-gray-900 hover:bg-gray-800 rounded transition cursor-pointer">7</button>
                        <button onclick="pressCalc('8')" class="calc-btn p-2 bg-gray-900 hover:bg-gray-800 rounded transition cursor-pointer">8</button>
                        <button onclick="pressCalc('9')" class="calc-btn p-2 bg-gray-900 hover:bg-gray-800 rounded transition cursor-pointer">9</button>
                        <button onclick="pressCalc('+')" class="calc-btn p-2 bg-purple-900/40 hover:bg-purple-900 rounded transition cursor-pointer row-span-2 flex items-center justify-center">+</button>

                        <button onclick="pressCalc('4')" class="calc-btn p-2 bg-gray-900 hover:bg-gray-800 rounded transition cursor-pointer">4</button>
                        <button onclick="pressCalc('5')" class="calc-btn p-2 bg-gray-900 hover:bg-gray-800 rounded transition cursor-pointer">5</button>
                        <button onclick="pressCalc('6')" class="calc-btn p-2 bg-gray-900 hover:bg-gray-800 rounded transition cursor-pointer">6</button>

                        <button onclick="pressCalc('1')" class="calc-btn p-2 bg-gray-900 hover:bg-gray-800 rounded transition cursor-pointer">1</button>
                        <button onclick="pressCalc('2')" class="calc-btn p-2 bg-gray-900 hover:bg-gray-800 rounded transition cursor-pointer">2</button>
                        <button onclick="pressCalc('3')" class="calc-btn p-2 bg-gray-900 hover:bg-gray-800 rounded transition cursor-pointer">3</button>
                        <button onclick="evalCalc()" class="calc-btn p-2 bg-cyan-600 hover:bg-cyan-500 text-black font-extrabold rounded transition cursor-pointer row-span-2 flex items-center justify-center">=</button>

                        <button onclick="pressCalc('0')" class="calc-btn p-2 bg-gray-900 hover:bg-gray-800 rounded transition cursor-pointer col-span-2">0</button>
                        <button onclick="pressCalc('.')" class="calc-btn p-2 bg-gray-900 hover:bg-gray-800 rounded transition cursor-pointer">.</button>
                    </div>
                </div>
            </div>

            <!-- EXIBIÇÃO DE RESULTADOS -->
            <div class="flex flex-col justify-between bg-purple-950/20 rounded-xl p-6 border border-purple-500/20">
                <div>
                    <h2 class="text-2xl font-bold text-cyan-400 mb-6 uppercase tracking-wide"><i class="fa-solid fa-database mr-2"></i>Volume Calculado</h2>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-black/40 p-3 rounded-lg border border-gray-800">
                            <span class="text-xs text-gray-400 font-bold uppercase block">Metros Cúbicos (m³)</span>
                            <span id="resM3" class="text-2xl font-bold text-white digital-font">0.000</span>
                        </div>
                        <div class="bg-black/40 p-3 rounded-lg border border-gray-800">
                            <span class="text-xs text-cyan-400 font-bold uppercase block">Litros (L)</span>
                            <span id="resL" class="text-2xl font-bold text-cyan-400 digital-font">0.00</span>
                        </div>
                        <div class="bg-black/40 p-3 rounded-lg border border-gray-800">
                            <span class="text-xs text-amber-400 font-bold uppercase block">Barris (bbl)</span>
                            <span id="resBbl" class="text-2xl font-bold text-amber-400 digital-font">0.00</span>
                        </div>
                        <div class="bg-black/40 p-3 rounded-lg border border-gray-800">
                            <span class="text-xs text-pink-400 font-bold uppercase block">Galões (gal)</span>
                            <span id="resGal" class="text-2xl font-bold text-pink-400 digital-font">0.00</span>
                        </div>
                    </div>
                </div>

                <div class="mt-6 p-3 bg-cyan-950/30 border border-cyan-500/20 rounded-lg text-xs text-cyan-300">
                    <i class="fa-solid fa-circle-info mr-1"></i> Digite os valores em <strong>metros</strong> nos campos ao lado para obter o cálculo exato em tempo real.
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- RELÓGIO DIGITAL ---
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('pt-BR');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- CRONÔMETRO ---
        let stopwatchInterval;
        let elapsedTime = 0;

        function startStopwatch() {
            if (!stopwatchInterval) {
                const startTime = Date.now() - elapsedTime;
                stopwatchInterval = setInterval(() => {
                    elapsedTime = Date.now() - startTime;
                    displayStopwatch();
                }, 10);
            }
        }

        function pauseStopwatch() {
            clearInterval(stopwatchInterval);
            stopwatchInterval = null;
        }

        function resetStopwatch() {
            clearInterval(stopwatchInterval);
            stopwatchInterval = null;
            elapsedTime = 0;
            displayStopwatch();
        }

        function displayStopwatch() {
            const totalSeconds = Math.floor(elapsedTime / 1000);
            const minutes = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            const seconds = (totalSeconds % 60).toString().padStart(2, '0');
            const milliseconds = Math.floor((elapsedTime % 1000) / 10).toString().padStart(2, '0');
            document.getElementById('stopwatch').innerHTML =
                `${minutes}:${seconds}.<span class="text-xl">${milliseconds}</span>`;
        }

        // --- CALCULADORA AUXILIAR ---
        const calcDisplay = document.getElementById('calcDisplay');

        function pressCalc(val) {
            calcDisplay.value += val;
        }

        function clearCalc() {
            calcDisplay.value = '';
        }

        function evalCalc() {
            try {
                if (calcDisplay.value) {
                    // Avalia a expressão de forma segura
                    calcDisplay.value = Function('"use strict"; return (' + calcDisplay.value + ')')();
                }
            } catch (e) {
                calcDisplay.value = 'Erro';
            }
        }

        // --- CALCULADORA DE VOLUME DO TANQUE ---
        const inputsTemplates = {
            cylinder: `
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Raio da Base (metros)</label>
                        <input type="number" id="radius" oninput="calculateVolume()" step="0.01" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:border-cyan-400 focus:outline-none" placeholder="Ex: 1.5">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Altura do Corpo (metros)</label>
                        <input type="number" id="height" oninput="calculateVolume()" step="0.01" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:border-cyan-400 focus:outline-none" placeholder="Ex: 3.2">
                    </div>
                `,
            square: `
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Comprimento (metros)</label>
                        <input type="number" id="length" oninput="calculateVolume()" step="0.01" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:border-cyan-400 focus:outline-none" placeholder="Ex: 2.0">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Largura (metros)</label>
                        <input type="number" id="width" oninput="calculateVolume()" step="0.01" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:border-cyan-400 focus:outline-none" placeholder="Ex: 1.8">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Altura (metros)</label>
                        <input type="number" id="height" oninput="calculateVolume()" step="0.01" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:border-cyan-400 focus:outline-none" placeholder="Ex: 2.5">
                    </div>
                `,
            cone: `
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Raio da Base (metros)</label>
                        <input type="number" id="radius" oninput="calculateVolume()" step="0.01" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:border-cyan-400 focus:outline-none" placeholder="Ex: 1.2">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Altura Cilindro Superior (metros)</label>
                        <input type="number" id="height" oninput="calculateVolume()" step="0.01" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:border-cyan-400 focus:outline-none" placeholder="Ex: 2.0">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Altura do Cone Inferior (metros)</label>
                        <input type="number" id="coneHeight" oninput="calculateVolume()" step="0.01" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:border-cyan-400 focus:outline-none" placeholder="Ex: 1.0">
                    </div>
                `
        };

        function toggleInputs() {
            const selected = document.getElementById('tankType').value;
            document.getElementById('inputsContainer').innerHTML = inputsTemplates[selected] || '';
            clearOutputs();
        }

        function clearOutputs() {
            document.getElementById('resM3').textContent = '0.000';
            document.getElementById('resL').textContent = '0.00';
            document.getElementById('resBbl').textContent = '0.00';
            document.getElementById('resGal').textContent = '0.00';
        }

        function calculateVolume() {
            const type = document.getElementById('tankType').value;
            let vM3 = 0;

            try {
                if (type === 'cylinder') {
                    const r = parseFloat(document.getElementById('radius')?.value) || 0;
                    const h = parseFloat(document.getElementById('height')?.value) || 0;
                    vM3 = Math.PI * Math.pow(r, 2) * h;
                } else if (type === 'square') {
                    const l = parseFloat(document.getElementById('length')?.value) || 0;
                    const w = parseFloat(document.getElementById('width')?.value) || 0;
                    const h = parseFloat(document.getElementById('height')?.value) || 0;
                    vM3 = l * w * h;
                } else if (type === 'cone') {
                    const r = parseFloat(document.getElementById('radius')?.value) || 0;
                    const hCil = parseFloat(document.getElementById('height')?.value) || 0;
                    const hCone = parseFloat(document.getElementById('coneHeight')?.value) || 0;
                    vM3 = (Math.PI * Math.pow(r, 2) * hCil) + ((1 / 3) * Math.PI * Math.pow(r, 2) * hCone);
                }
            } catch (e) {
                vM3 = 0;
            }

            // Atualiza os resultados com formatação adequada
            document.getElementById('resM3').textContent = vM3.toFixed(3);

            // Litros: 1 m³ = 1000 L
            document.getElementById('resL').textContent = (vM3 * 1000).toLocaleString('pt-BR', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });

            // Barris: 1 m³ ≈ 6.28981077 bbl
            document.getElementById('resBbl').textContent = (vM3 * 6.28981).toLocaleString('pt-BR', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });

            // Galões: 1 m³ ≈ 264.172052 gal
            document.getElementById('resGal').textContent = (vM3 * 264.172).toLocaleString('pt-BR', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

        // Inicializa o template com a primeira opção (Cilindro)
        toggleInputs();

        // Permite usar a tecla Enter na calculadora auxiliar
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                evalCalc();
            }
        });
    </script>

</body>
</html>
